name: Update Binance Funding

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test API connectivity
        run: curl -sf --max-time 10 "https://fapi.binance.com/fapi/v1/ping" && echo "API reachable" || echo "API blocked from this runner"

      - name: Fetch funding data
        run: python scripts/update_funding.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/binance_btcusdt_funding.csv
          git diff --cached --quiet || (git commit -m "Update BTCUSDT funding data" && git push)

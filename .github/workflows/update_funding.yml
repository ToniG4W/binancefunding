name: Update Binance Funding

# NOTE: Binance blocks GitHub Actions runner IPs (HTTP 451).
# This workflow is kept for reference but will likely fail.
# Use Kinsta Cron Jobs instead.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      ENABLE_GIT_PUSH: "true"
      GIT_USER_NAME: "github-actions[bot]"
      GIT_USER_EMAIL: "github-actions[bot]@users.noreply.github.com"
      GIT_BRANCH: "main"
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch funding data & push
        run: python scripts/update_funding.py
